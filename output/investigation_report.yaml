bug_summary:
  symptoms: After deploying **bug_fix** `v2.3.0-canary`, the **15-minute rolling tile** on the executive dashboard reads **~20–37%
    below** the sum of per-minute ingest values shown in the raw drill-down table. The discrepancy **disappears** once enough
    minutes have accumulated (after the window is full). Finance noticed first because the tile feeds a reconciliation export.
  scope: bug_fix dashboard rolling aggregate API + bug_fix library
  severity: P1
evidence:
  log_excerpts:
  - '  File "/usr/local/lib/python3.11/site-packages/bug_fix/rolling.py", line 24, in last_n_sum'
  - 2026-04-07T14:02:14.901Z DEBUG bug_fix-api req_id=b02 lib="bug_fix.rolling" detail="RollingMetrics.last_n_sum n=5 buflen=3"
  - 2026-04-07T14:02:14.882Z ERROR bug_fix-api req_id=b02 method=GET path=/metrics/window minutes=15 status=200 body_total=30.0
    expected_total=47.5 delta=-17.5 msg="reconciliation guard tripped (soft)"
