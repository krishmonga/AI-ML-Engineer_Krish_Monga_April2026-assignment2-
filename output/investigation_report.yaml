    expected_total=47.5 delta=-10.0
  - 2026-04-07T14:03:45.003Z INFO  bug_fix-api req_id=e55 method=GET path=/metrics/window minutes=15 status=200 body_total=47.5
    expected_total=47.5 delta=0.0 msg="window full; guard quiet"
  stack_trace_blocks:
